joy_teleop:
  ros__parameters:
    move:
      type: topic
      interface_type: geometry_msgs/msg/Twist
      topic_name: /cmd_vel

      deadman_buttons: [5]

      axis_mappings:
        # Left stick horizontal -> front differential (roll)
        linear-y:
          axis: 0
          scale: 0.045
          offset: 0.0

        # Right stick vertical -> tail symmetric (pitch)
        angular-z:
          axis: 4
          scale: -0.10
          offset: 0.0
